<div class="login-container">
  <h2 class="login-title">Вы действительно хотите удалить?</h2>

  <!-- Добавляем контейнер для кнопок -->
  <div class="button-group">
    <button (click)="onClosed()" class="cancel-btn">
      Отменить
    </button>
    <button (click)="onConfirm()" class="delete-btn">
      Удалить
    </button>
  </div>
</div>
